name: reallocation-instructions
title: "The Reallocation Engine agent instructions (source for AGENTS.md + CLAUDE.md)"

# Shared rule modules — the portable ~95%, the SAME library Madison and Mycroft
# draw from (vendored per-repo so the three can diverge without coupling).
# Selects all six: backing tools/files all present (MYCROFT.md, DOMAIN.md,
# conformance.mjs, to-markdown.mjs). Order = output order.
shared:
  - governance.md
  - markdown-default.md
  - "no-delete.md"
  - conformance-gate.md
  - subagent-scoping.md
  - completion-report.md

# Project-specific source (identity, layout rules, the help menu).
project: reallocation-engine.md

# Appended ONLY to CLAUDE.md (Claude supports @import; other tools read AGENTS.md).
claude_only:
  - "## Claude Code"
  - "@MYCROFT.md"
  - "- Use plan mode before edits under recipes/, data/, or anything touching data/ats/ (private)."

targets:
  - agents
  - claude
